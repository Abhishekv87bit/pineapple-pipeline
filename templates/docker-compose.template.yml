# Placeholders:
#   {{PROJECT_NAME}}    - Project name (e.g., kinetic-forge-studio)
#   {{BACKEND_PORT}}    - Backend port (default: 8000)
#   {{FRONTEND_PORT}}   - Frontend port (default: 3000)
#   {{BACKEND_DIR}}     - Backend directory (default: backend)
#   {{FRONTEND_DIR}}    - Frontend directory (default: frontend)
#   {{DB_PATH}}         - SQLite database path (default: /data/app.db)
#   {{ENV_FILE}}        - Environment file path (default: .env)

version: "3.8"

services:
  backend:
    build:
      context: ./{{BACKEND_DIR}}
      dockerfile: Dockerfile
    ports:
      - "{{BACKEND_PORT}}:{{BACKEND_PORT}}"
    volumes:
      - app-data:{{DB_PATH}}
    env_file:
      - {{ENV_FILE}}
    environment:
      - DATABASE_URL=sqlite:///{{DB_PATH}}/app.db
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:{{BACKEND_PORT}}/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  frontend:
    build:
      context: ./{{FRONTEND_DIR}}
      dockerfile: Dockerfile
      args:
        API_URL: http://backend:{{BACKEND_PORT}}
    ports:
      - "{{FRONTEND_PORT}}:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  app-data:
